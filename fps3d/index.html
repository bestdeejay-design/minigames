<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPS Corridor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:system-ui,sans-serif}
canvas{display:block}

#ui{position:fixed;inset:0;pointer-events:none;z-index:10}
#crosshair{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:28px;height:28px;transition:all .1s;
}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:#fff;border-radius:1px}
#crosshair::before{top:50%;left:2px;right:2px;height:2px;transform:translateY(-50%)}
#crosshair::after{left:50%;top:2px;bottom:2px;width:2px;transform:translateX(-50%)}
#crosshair.hit::before,#crosshair.hit::after{background:#ff4444}
#crosshair.hit{transform:translate(-50%,-50%) scale(1.4)}

#hud{
  position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
  display:flex;gap:24px;color:#fff;font-size:0.9rem;font-weight:600;
  background:rgba(0,0,0,0.4);padding:10px 20px;border-radius:10px;backdrop-filter:blur(4px);
}
#hud span{display:flex;align-items:center;gap:6px}
#hud .label{font-size:0.65rem;opacity:.4;text-transform:uppercase;letter-spacing:1px}
#health-bar{width:60px;height:4px;background:rgba(255,255,255,.12);border-radius:2px;overflow:hidden}
#health-fill{height:100%;background:linear-gradient(90deg,#e74c3c,#2ecc71);border-radius:2px;transition:width .15s}

#score-display{position:absolute;top:20px;right:24px;color:#fff;font-size:1.5rem;font-weight:700;text-shadow:0 2px 12px rgba(0,0,0,.6)}
#wave-display{
  position:absolute;top:20px;left:50%;transform:translateX(-50%);
  color:#fff;font-size:0.7rem;font-weight:600;opacity:.4;
  background:rgba(0,0,0,.3);padding:5px 14px;border-radius:20px;backdrop-filter:blur(4px);
  letter-spacing:2px;text-transform:uppercase;
}

#start-screen,#death-screen,#win-screen{
  position:fixed;inset:0;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,0,0,.9);color:#fff;text-align:center;
}
#start-screen h1{font-size:2.5rem;font-weight:700;margin-bottom:4px;letter-spacing:-1px}
#start-screen p{font-size:.9rem;opacity:.5;margin-bottom:24px;max-width:400px;line-height:1.5}
#start-screen .badge{display:inline-block;padding:4px 14px;border:1px solid rgba(255,255,255,.1);border-radius:20px;font-size:.6rem;letter-spacing:2px;text-transform:uppercase;opacity:.35;margin-bottom:16px}
.btn{pointer-events:auto;padding:12px 44px;border:1px solid rgba(255,255,255,.2);border-radius:30px;background:transparent;color:#fff;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .25s;letter-spacing:.5px}
.btn:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.35)}
.keys{display:flex;gap:5px;justify-content:center;margin:10px 0 18px;flex-wrap:wrap}
.key{padding:4px 10px;border:1px solid rgba(255,255,255,.1);border-radius:4px;font-size:.65rem;background:rgba(255,255,255,.03)}
#death-screen h2{font-size:2.5rem;font-weight:700;margin-bottom:8px}
#death-screen .final{font-size:1.1rem;opacity:.6;margin-bottom:28px}
#win-screen h2{font-size:2.5rem;font-weight:700;margin-bottom:8px;color:#2ecc71}
#win-screen .final{font-size:1.1rem;opacity:.6;margin-bottom:28px}
.hidden{display:none!important}

#ammo-display{position:absolute;bottom:80px;right:24px;color:#fff;font-size:1rem;font-weight:700;background:rgba(0,0,0,.3);padding:5px 12px;border-radius:8px;backdrop-filter:blur(4px)}
#reload-hint{position:absolute;bottom:58px;right:24px;color:#e74c3c;font-size:.65rem;opacity:0;transition:opacity .25s;background:rgba(0,0,0,.3);padding:3px 8px;border-radius:5px}
#damage-overlay{position:fixed;inset:0;z-index:9;pointer-events:none;background:radial-gradient(ellipse at center,transparent 50%,rgba(255,0,0,0));opacity:0;transition:opacity .1s}
#hit-crosshair{position:fixed;inset:0;z-index:11;pointer-events:none;opacity:0;transition:opacity .08s;display:flex;align-items:center;justify-content:center}
#hit-crosshair span{display:block;width:60px;height:60px;border:3px solid #ff4444;border-radius:50%;transform:scale(0.5);transition:transform .1s}

.tip{position:absolute;bottom:120px;left:50%;transform:translateX(-50%);color:#fff;font-size:.7rem;opacity:0;transition:opacity .5s;background:rgba(0,0,0,.4);padding:6px 16px;border-radius:20px;white-space:nowrap}
</style>
</head>
<body>

<div id="damage-overlay"></div>
<div id="hit-crosshair"><span></span></div>

<div id="start-screen">
  <div class="badge">3D FPS</div>
  <h1>КОРИДОР</h1>
  <p>Вы в тёмном коридоре. Идите вперёд (W) — <br>оттуда идут враги. Стреляйте по зелёным кубам.</p>
  <div class="keys">
    <span class="key">W</span>
    <span class="key">A S D</span>
    <span class="key">Пробел</span>
    <span class="key">R</span>
  </div>
  <button class="btn" id="startBtn">НАЧАТЬ</button>
</div>

<div id="death-screen" class="hidden">
  <h2>💀 ВЫ УБИТЫ</h2>
  <p class="final" id="deathScore">0 очков</p>
  <button class="btn" id="restartBtn">ЗАНОВО</button>
</div>

<div id="win-screen" class="hidden">
  <h2>🎉 ПОБЕДА</h2>
  <p class="final" id="winScore">0 очков</p>
  <button class="btn" id="nextBtn">ЗАНОВО</button>
</div>

<div id="ui">
  <div id="crosshair"><div id="crosshair-dot"></div></div>
  <div id="score-display">0</div>
  <div id="wave-display">ВОЛНА 1</div>
  <div id="ammo-display">12/12</div>
  <div id="reload-hint">R — ПЕРЕЗАРЯДИТЬ</div>
  <div class="tip" id="tip"></div>
  <div id="hud">
    <span><span class="label">HP</span><span id="health-val">100</span><span id="health-bar"><span id="health-fill" style="width:100%"></span></span></span>
    <span><span class="label">СЧЁТ</span><span id="score-val">0</span></span>
  </div>
</div>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"}}</script>

<script type="module">
import * as THREE from 'three';

const WAVES = [4,6,8,10,12,15];
const L = 30, W = 7, H = 4;

let scene,camera,renderer,clock;
let hp=100,score=0,wave=0,alive=true;
let enemies=[];
let keys={w:false,a:false,s:false,d:false};
let locked=false;
let ammo=12,maxAmmo=12,reloading=false,reloadTimer=0;
let fireCD=0;
let waveTotal=0,spawned=0,killed=0,spawnTimer=0;
let gameOver=false,audioCtx;

function beep(type){
  if(!audioCtx)return;
  try{
    const c=audioCtx,o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);
    if(type=='shoot'){
      o.type='sawtooth';o.frequency.setValueAtTime(1000,c.currentTime);
      o.frequency.exponentialRampToValueAtTime(80,c.currentTime+.05);
      g.gain.setValueAtTime(.15,c.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.05);
      o.start(c.currentTime);o.stop(c.currentTime+.05);
    }else if(type=='hit'){
      o.type='sine';o.frequency.setValueAtTime(250,c.currentTime);
      o.frequency.exponentialRampToValueAtTime(60,c.currentTime+.06);
      g.gain.setValueAtTime(.12,c.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.06);
      o.start(c.currentTime);o.stop(c.currentTime+.06);
    }else if(type=='hurt'){
      o.type='sawtooth';o.frequency.setValueAtTime(400,c.currentTime);
      o.frequency.exponentialRampToValueAtTime(80,c.currentTime+.1);
      g.gain.setValueAtTime(.1,c.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.1);
      o.start(c.currentTime);o.stop(c.currentTime+.1);
    }else if(type=='reload'){
      o.type='sine';o.frequency.setValueAtTime(350,c.currentTime);
      o.frequency.setValueAtTime(600,c.currentTime+.06);
      o.frequency.setValueAtTime(350,c.currentTime+.12);
      g.gain.setValueAtTime(.08,c.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.18);
      o.start(c.currentTime);o.stop(c.currentTime+.18);
    }else if(type=='kill'){
      o.type='square';o.frequency.setValueAtTime(150,c.currentTime);
      o.frequency.exponentialRampToValueAtTime(500,c.currentTime+.08);
      g.gain.setValueAtTime(.08,c.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.1);
      o.start(c.currentTime);o.stop(c.currentTime+.1);
    }else if(type=='wave'){
      o.type='sine';o.frequency.setValueAtTime(400,c.currentTime);
      o.frequency.setValueAtTime(600,c.currentTime+.1);
      o.frequency.setValueAtTime(800,c.currentTime+.2);
      g.gain.setValueAtTime(.08,c.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.25);
      o.start(c.currentTime);o.stop(c.currentTime+.25);
    }
  }catch(e){}
}

function init(){
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  document.addEventListener('click',()=>{if(audioCtx.state=='suspended')audioCtx.resume()},{once:true});

  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x08080c);
  scene.fog=new THREE.FogExp2(0x08080c,.03);

  camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,60);
  camera.position.set(0,1.6,L/2-2);

  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.shadowMap.enabled=true;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=.9;
  document.body.prepend(renderer.domElement);
  clock=new THREE.Clock();

  const hw=W/2,hh=H/2;
  const fm=new THREE.MeshStandardMaterial({color:0x0e0e14,roughness:.9});
  const wm=new THREE.MeshStandardMaterial({color:0x14141c,roughness:.8,metalness:.2});
  const pm=new THREE.MeshStandardMaterial({color:0x1a1a26,roughness:.7});
  const sm=new THREE.MeshStandardMaterial({color:0x2a2a38,roughness:.5,metalness:.2});
  const cm=new THREE.MeshStandardMaterial({color:0x0a0a10,roughness:.9});

  const fl=new THREE.Mesh(new THREE.PlaneGeometry(W,L),fm);
  fl.rotation.x=-Math.PI/2;fl.position.set(0,-hh,0);fl.receiveShadow=true;scene.add(fl);

  const cl=new THREE.Mesh(new THREE.PlaneGeometry(W,L),cm);
  cl.rotation.x=Math.PI/2;cl.position.set(0,hh,0);scene.add(cl);

  for(let s of[-1,1]){
    const wl=new THREE.Mesh(new THREE.PlaneGeometry(L,H),wm);
    wl.rotation.y=s*Math.PI/2;wl.position.set(s*hw,0,0);scene.add(wl);
  }

  for(let z=-L/2;z<L/2;z+=2.5){
    for(let x of[-hw+.05,hw-.05]){
      const p=new THREE.Mesh(new THREE.PlaneGeometry(2,1.6),pm);
      p.position.set(x,0.2,z);p.rotation.y=x<0?Math.PI/2:-Math.PI/2;scene.add(p);
    }
  }

  for(let z=-L/2;z<L/2;z+=3){
    for(let x of[-hw+.02,hw-.02]){
      const st=new THREE.Mesh(new THREE.PlaneGeometry(.05,H-.3),sm);
      st.position.set(x,0,z);st.rotation.y=x<0?Math.PI/2:-Math.PI/2;scene.add(st);
    }
  }

  for(let z=-L/2+3;z<L/2-3;z+=6){
    for(let x of[-hw+.5,hw-.5]){
      const pl=new THREE.Mesh(new THREE.BoxGeometry(.25,H,.25),
        new THREE.MeshStandardMaterial({color:0x222230,roughness:.6,metalness:.3}));
      pl.position.set(x,0,z);pl.castShadow=true;scene.add(pl);
    }
  }

  const ew=new THREE.Mesh(new THREE.PlaneGeometry(W,H),wm);
  ew.position.set(0,0,-L/2);ew.rotation.y=Math.PI;scene.add(ew);

  const bw=new THREE.Mesh(new THREE.PlaneGeometry(W,H),
    new THREE.MeshStandardMaterial({color:0x0e0e14,roughness:.9}));
  bw.position.set(0,0,L/2);scene.add(bw);

  scene.add(new THREE.AmbientLight(0x1a1a2e,.5));
  for(let z=-L/2+2;z<L/2-2;z+=5){
    const pl=new THREE.PointLight(0x4444aa,.4,6);
    pl.position.set(0,hh-.3,z);scene.add(pl);
  }
  const dl=new THREE.DirectionalLight(0x6666cc,.15);
  dl.position.set(0,10,0);scene.add(dl);

  const g=new THREE.Group();
  const bm=new THREE.MeshStandardMaterial({color:0x2a2a3a,roughness:.4,metalness:.5});
  const dm=new THREE.MeshStandardMaterial({color:0x181822,roughness:.7,metalness:.3});
  const body=new THREE.Mesh(new THREE.BoxGeometry(.08,.05,.35),bm);
  body.position.set(0,-.05,-.35);g.add(body);
  const bar=new THREE.Mesh(new THREE.CylinderGeometry(.018,.025,.3),dm);
  bar.rotation.x=Math.PI/2;bar.position.set(0,-.015,-.4);g.add(bar);
  const grp=new THREE.Mesh(new THREE.BoxGeometry(.04,.08,.04),dm);
  grp.position.set(0,-.1,-.2);g.add(grp);
  g.position.set(.2,-.18,-.25);camera.add(g);

  addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
  });
  document.addEventListener('pointerlockchange',()=>{locked=document.pointerLockElement===renderer.domElement});
  document.addEventListener('keydown',e=>{
    const k=e.key.toLowerCase();
    if(k=='r'&&alive&&!gameOver)startReload();
    if(k=='w'||k=='a'||k=='s'||k=='d')keys[k]=true;
    if(k==' '){e.preventDefault();shoot()}
  });
  document.addEventListener('keyup',e=>{const k=e.key.toLowerCase();if(k=='w'||k=='a'||k=='s'||k=='d')keys[k]=false});
  renderer.domElement.addEventListener('mousedown',e=>{if(e.button==0)shoot()});
  renderer.domElement.addEventListener('touchstart',e=>{e.preventDefault();shoot()},{passive:false});

  document.getElementById('startBtn').addEventListener('click',()=>{
    document.getElementById('start-screen').classList.add('hidden');resetGame();
  });
  document.getElementById('restartBtn').addEventListener('click',resetGame);
  document.getElementById('nextBtn').addEventListener('click',resetGame);
  updateHUD();updateAmmo();
  requestAnimationFrame(animate);
}

function resetGame(){
  hp=100;score=0;wave=0;alive=true;gameOver=false;
  killed=0;spawned=0;waveTotal=0;spawnTimer=0;
  ammo=maxAmmo;reloading=false;reloadTimer=0;fireCD=0;
  for(const e of enemies)scene.remove(e.mesh);
  enemies=[];
  camera.position.set(0,1.6,L/2-2);
  camera.rotation.set(0,0,0);
  document.getElementById('death-screen').classList.add('hidden');
  document.getElementById('win-screen').classList.add('hidden');
  document.getElementById('crosshair').classList.remove('hit');
  updateHUD();updateAmmo();
  nextWave();
  if(document.pointerLockElement!==renderer.domElement)
    renderer.domElement.requestPointerLock();
}

function nextWave(){
  wave++;
  if(wave>WAVES.length){win();return;}
  waveTotal=WAVES[wave-1];spawned=0;killed=0;
  document.getElementById('wave-display').textContent='ВОЛНА '+wave;
  spawnTimer=.3;
  beep('wave');
  showTip('ВРАГИ ВПЕРЕДИ! ИДИТЕ ВПЕРЁД (W)',3);
}

function showTip(t,s){
  const el=document.getElementById('tip');
  el.textContent=t;el.style.opacity='1';
  if(window._tipTimer)clearTimeout(window._tipTimer);
  window._tipTimer=setTimeout(()=>{el.style.opacity='0'},(s||2)*1000);
}

function win(){
  gameOver=true;alive=false;
  document.getElementById('winScore').textContent=score+' очков';
  document.getElementById('win-screen').classList.remove('hidden');
  try{document.exitPointerLock()}catch(e){}
}

function die(){
  gameOver=true;alive=false;
  document.getElementById('deathScore').textContent=score+' очков';
  document.getElementById('death-screen').classList.remove('hidden');
  try{document.exitPointerLock()}catch(e){}
}

function startReload(){
  if(reloading||ammo==maxAmmo||!alive||gameOver)return;
  reloading=true;reloadTimer=.8;
  document.getElementById('reload-hint').style.opacity='1';
  document.getElementById('reload-hint').textContent='ПЕРЕЗАРЯДКА...';
  beep('reload');
}

function shoot(){
  if(!alive||gameOver||reloading)return;
  if(!locked){renderer.domElement.requestPointerLock();return;}
  if(fireCD>0)return;
  if(ammo<=0){startReload();return;}
  ammo--;fireCD=.18;beep('shoot');updateAmmo();

  const r=new THREE.Raycaster();
  r.setFromCamera({x:0,y:0},camera);
  let hit=null,hitD=Infinity;
  for(const e of enemies){
    if(!e.alive)continue;
    const d=camera.position.distanceTo(e.mesh.position);
    if(d<25){
      const b=new THREE.Box3().setFromObject(e.mesh);
      if(r.ray.intersectsBox(b)&&d<hitD){hit=e;hitD=d;}
    }
  }
  if(hit){
    hit.hp-=33;beep('hit');
    hit.mesh.material.color.setHex(0xff4444);
    hit.mesh.material.emissive.setHex(0xff2222);
    document.getElementById('crosshair').classList.add('hit');
    setTimeout(()=>{document.getElementById('crosshair').classList.remove('hit')},80);

    if(hit.hp<=0){
      hit.alive=false;score+=100;killed++;beep('kill');
      scene.remove(hit.mesh);
      const p=hit.mesh.position.clone();explode(p);
      updateHUD();
      if(killed>=waveTotal)setTimeout(nextWave,1000);
    }else{
      setTimeout(()=>{
        if(hit.alive){hit.mesh.material.color.setHex(0x44ff44);hit.mesh.material.emissive.setHex(0x44ff44)}
      },100);
    }
  }
}

function explode(pos){
  const n=20,geom=new THREE.BufferGeometry();
  const p=new Float32Array(n*3);
  for(let i=0;i<n;i++){p[i*3]=(Math.random()-.5)*.2;p[i*3+1]=(Math.random()-.5)*.2;p[i*3+2]=(Math.random()-.5)*.2}
  geom.setAttribute('position',new THREE.BufferAttribute(p,3));
  const mat=new THREE.PointsMaterial({size:.08,color:0xff8800,transparent:true,opacity:1,blending:THREE.AdditiveBlending});
  const pts=new THREE.Points(geom,mat);pts.position.copy(pos);scene.add(pts);
  const vel=[];for(let i=0;i<n;i++)vel.push(new THREE.Vector3((Math.random()-.5)*4,Math.random()*3,(Math.random()-.5)*4));
  let t=0;
  const iv=setInterval(()=>{
    t+=.016;if(t>.35){clearInterval(iv);scene.remove(pts);return;}
    const a=pts.geometry.attributes.position.array;
    for(let i=0;i<n;i++){a[i*3]+=vel[i].x*.016;a[i*3+1]+=vel[i].y*.016;a[i*3+2]+=vel[i].z*.016}
    pts.geometry.attributes.position.needsUpdate=true;pts.material.opacity=1-t*2.8;
  },16);
}

function spawn(){
  const z=-L/2+3+Math.random()*3;
  const x=(Math.random()-.5)*(W-2);
  const s=1.8+wave*.12;
  const m=new THREE.MeshStandardMaterial({
    color:0x44ff44,emissive:0x44ff44,emissiveIntensity:.4,
    roughness:.3,metalness:.4,
  });
  const h=.6+Math.random()*.15;
  const mesh=new THREE.Mesh(new THREE.BoxGeometry(.45,h,.45),m);
  mesh.position.set(x,h/2,z);mesh.castShadow=true;scene.add(mesh);
  const em=new THREE.MeshBasicMaterial({color:0xff2222});
  for(let s of[-1,1]){
    const eye=new THREE.Mesh(new THREE.SphereGeometry(.05,6,6),em);
    eye.position.set(s*.1,h/2-.02,-.22);mesh.add(eye);
  }
  enemies.push({mesh,hp:80+wave*10,alive:true,speed:s,shootTimer:Math.random()*.3});
}

function updatePlayer(dt){
  if(!alive||gameOver)return;
  const sp=5;
  const dir=new THREE.Vector3();
  if(keys.w)dir.z-=1;if(keys.s)dir.z+=1;if(keys.a)dir.x-=1;if(keys.d)dir.x+=1;
  if(dir.length()>0){
    dir.normalize();dir.applyQuaternion(camera.quaternion);dir.y=0;
    if(dir.length()>0){dir.normalize().multiplyScalar(sp*dt);camera.position.add(dir);}
  }
  const hw=W/2-.3;
  camera.position.x=Math.max(-hw,Math.min(hw,camera.position.x));
  camera.position.z=Math.max(-L/2+1,Math.min(L/2-1,camera.position.z));
}

function updateEnemies(dt){
  const pp=camera.position.clone();
  for(const e of enemies){
    if(!e.alive)continue;
    const d=new THREE.Vector3().copy(pp).sub(e.mesh.position);
    const dist=d.length();
    if(dist>.3){
      d.normalize();
      e.mesh.position.x+=d.x*e.speed*dt;
      e.mesh.position.z+=d.z*e.speed*dt;
    }
    e.mesh.lookAt(pp);e.mesh.rotation.x=0;
    if(dist<1.2){
      e.shootTimer+=dt;
      if(e.shootTimer>.6/(1+wave*.08)){e.shootTimer=0;damage(5+wave*2)}
    }
  }
}

function damage(a){
  if(!alive||gameOver)return;
  hp=Math.max(0,hp-a);beep('hurt');
  document.getElementById('damage-overlay').style.opacity='.35';
  setTimeout(()=>{document.getElementById('damage-overlay').style.opacity='0'},80);
  updateHUD();if(hp<=0)die();
}

function updateHUD(){
  document.getElementById('health-val').textContent=hp;
  document.getElementById('health-fill').style.width=hp+'%';
  document.getElementById('score-val').textContent=score;
  document.getElementById('score-display').textContent=score;
}
function updateAmmo(){document.getElementById('ammo-display').textContent=ammo+'/'+maxAmmo}

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),.05);
  if(alive&&!gameOver){
    if(locked){
      camera.rotation.y-=(document.movementX||0)*.002;
      camera.rotation.x-=(document.movementY||0)*.002;
      camera.rotation.x=Math.max(-Math.PI/2.5,Math.min(Math.PI/2.5,camera.rotation.x));
    }
    updatePlayer(dt);
    fireCD=Math.max(0,fireCD-dt);
    if(reloading){
      reloadTimer-=dt;
      if(reloadTimer<=0){reloading=false;ammo=maxAmmo;updateAmmo();document.getElementById('reload-hint').style.opacity='0'}
    }
    spawnTimer-=dt;
    if(spawnTimer<=0&&spawned<waveTotal){spawn();spawned++;spawnTimer=Math.max(.15,1-wave*.04)}
    updateEnemies(dt);
    enemies=enemies.filter(e=>e.alive);
  }
  for(const e of enemies){
    if(!e.alive)continue;
    e.mesh.material.emissiveIntensity=.3+Math.sin(Date.now()*.006+e.mesh.position.x)*.2;
  }
  renderer.render(scene,camera);
}

init();
</script>
