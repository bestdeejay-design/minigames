<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Mini Platformer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-wrapper">
    <h1>Mini Platformer</h1>
    <canvas id="gameCanvas"></canvas>
    <div id="touch-controls">
      <button id="btn-left" class="ctrl-btn">←</button>
      <button id="btn-right" class="ctrl-btn">→</button>
      <button id="btn-jump" class="ctrl-btn">↑</button>
    </div>
    <p id="status">Собери монетку!</p>
    <button id="btn-reset">Заново</button>
  </div>
  <script src="game.js"></script>
</body>
</html>
